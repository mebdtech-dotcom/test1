# Local ephemeral Postgres for the test harness + Prisma migrations (Doc-8B §3).
# CI uses a postgres service container instead (WP-0.10). No secrets here — local-only
# credentials; the real Supabase project + secrets are wired at Wave 1.
#
# Usage:  docker compose up -d db
#   then: DATABASE_URL=postgresql://postgres:postgres@localhost:5432/ivendorz \
#         DIRECT_URL=postgresql://postgres:postgres@localhost:5432/ivendorz \
#         npm run db:migrate && npm test
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ivendorz
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - ivendorz-db:/var/lib/postgresql/data

volumes:
  ivendorz-db:
